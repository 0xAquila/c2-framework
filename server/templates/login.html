<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — NexaCloud</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f9fb; color: #1a1a2e;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ── NAV (matches decoy) ── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 64px; background: #fff;
      border-bottom: 1px solid #e8eaf0;
    }
    .logo { font-size: 1.3rem; font-weight: 700; color: #2563eb; letter-spacing: -0.5px; text-decoration: none; }
    .nav-links a { margin-left: 32px; text-decoration: none; color: #555; font-size: 0.92rem; }
    .nav-links a:hover { color: #2563eb; }
    .nav-cta {
      background: #2563eb; color: #fff !important; padding: 9px 22px;
      border-radius: 6px; font-size: 0.9rem;
    }
    .nav-cta:hover { background: #1d4ed8; }

    /* ── MAIN ── */
    .page-body {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 60px 24px;
      background: linear-gradient(135deg, #eff6ff 0%, #f8f9fb 60%);
    }

    .card {
      background: #fff; border: 1px solid #e8eaf0; border-radius: 12px;
      padding: 48px 44px; width: 100%; max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .card-logo {
      font-size: 1.4rem; font-weight: 700; color: #2563eb;
      letter-spacing: -0.5px; margin-bottom: 6px;
    }
    .card-title {
      font-size: 1.4rem; font-weight: 700; color: #0f172a; margin-bottom: 6px;
    }
    .card-sub {
      font-size: 0.88rem; color: #64748b; margin-bottom: 32px;
    }
    .card-sub a { color: #2563eb; text-decoration: none; }
    .card-sub a:hover { text-decoration: underline; }

    .field { margin-bottom: 18px; }
    label {
      display: block; font-size: 0.82rem; font-weight: 500;
      color: #374151; margin-bottom: 7px;
    }
    input[type="text"], input[type="password"] {
      width: 100%; background: #fff; border: 1.5px solid #d1d5db;
      border-radius: 7px; padding: 11px 14px;
      font-size: 0.9rem; color: #0f172a; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }

    .forgot {
      display: block; text-align: right; font-size: 0.8rem;
      color: #2563eb; text-decoration: none; margin-top: -10px; margin-bottom: 18px;
    }
    .forgot:hover { text-decoration: underline; }

    .error-box {
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 7px; padding: 10px 14px;
      font-size: 0.84rem; color: #dc2626; margin-bottom: 18px;
      display: flex; gap: 8px; align-items: flex-start;
    }
    .error-box::before { content: '⚠'; flex-shrink: 0; }

    .btn-submit {
      width: 100%; background: #2563eb; color: #fff; border: none;
      border-radius: 7px; padding: 12px; font-size: 0.92rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s; letter-spacing: 0.01em;
    }
    .btn-submit:hover { background: #1d4ed8; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 0; color: #94a3b8; font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #e8eaf0;
    }

    .btn-sso {
      width: 100%; background: #fff; color: #374151;
      border: 1.5px solid #d1d5db; border-radius: 7px; padding: 11px;
      font-size: 0.88rem; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.15s;
    }
    .btn-sso:hover { background: #f8f9fb; }
    .sso-icon { width: 18px; height: 18px; }

    /* ── FOOTER (matches decoy) ── */
    footer {
      background: #0f172a; color: #94a3b8;
      text-align: center; padding: 24px 64px; font-size: 0.82rem;
    }
    footer a { color: #64748b; text-decoration: none; margin: 0 10px; }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/">NexaCloud</a>
  <div class="nav-links">
    <a href="#">Products</a>
    <a href="#">Solutions</a>
    <a href="#">Pricing</a>
    <a href="#">Blog</a>
    <a href="#" class="nav-cta">Get Started</a>
  </div>
</nav>

<div class="page-body">
  <div class="card">
    <div class="card-logo">NexaCloud</div>
    <div class="card-title">Welcome back</div>
    <div class="card-sub">
      Don't have an account? <a href="#">Start your free trial</a>
    </div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" autocomplete="off">
      <div class="field">
        <label for="username">Work email</label>
        <input id="username" name="username" type="text"
               placeholder="you@company.com" autofocus/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password"
               placeholder="••••••••••••"/>
      </div>

      <a class="forgot" href="#">Forgot your password?</a>

      <button class="btn-submit" type="submit">Sign in</button>
    </form>

    <div class="divider">or continue with</div>

    <button class="btn-sso">
      <!-- Inline Google G icon -->
      <svg class="sso-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
  </div>
</div>

<footer>
  <p>© 2025 NexaCloud Technologies, Inc. All rights reserved.</p>
  <p style="margin-top:10px">
    <a href="#">Privacy</a><a href="#">Terms</a><a href="#">Security</a><a href="#">Status</a>
  </p>
</footer>

</body>
</html>
